name: aelf_flutter
description: The best Bible and liturgy catholic app.

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
version: 1.15.0+21

environment:
  sdk: ">=3.4.1 <4.0.0"

publish_to: none

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  logger: ^2.7.0
  path_provider: ^2.1.0
  flutter_html: ^3.0.0
  flutter_linkify: ^6.0.0
  http: ^1.6.0
  flutter_localizations:
    sdk: flutter
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.3
  sqlite3_flutter_libs: ^0.6.0
  shared_preferences: ^2.5.5
  connectivity_plus: ^7.1.1
  url_launcher: ^6.1.5
  package_info_plus: ^9.0.0
  provider: ^6.1.2
  unorm_dart: ^0.3.0
  yaml: ^3.1.2

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.9
  wakelock_plus: ^1.4.0
  diacritic: ^0.1.3
  after_layout: ^1.2.0
  device_info_plus: ^12.3.0
  path: ^1.9.1
  intl: ^0.20.2
  url_launcher_web: ^2.4.1
  shared_preferences_web: ^2.4.3
  html: ^0.15.6
  offline_liturgy:
    git:
      url: https://github.com/franzoom/offline-liturgy.git
      ref: 43f39e0ba53fddedfb4fa9b97643965b5aa155cf
  marionette_flutter: ^0.5.0
  share_plus: ^12.0.2

# Uncomment on your local laptop if you need to use a local copy of 'offline_liturgy'
# Comment again before doing a git commit and git push
dependency_overrides:
  offline_liturgy:
    path: ../offline-liturgy/

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.3
  flutter_lints: ^6.0.0
  lints: ^6.0.0
  marionette_mcp: ^0.5.0

flutter_launcher_icons:
  # Legacy Android (pre-API 26) + iOS source images:
  image_path_android: "assets/icons/ic_launcher_android.png"
  image_path_ios: "assets/icons/ic_launcher_ios.png"
  android: true
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 21
  # Android adaptive icon (API 26+) — PNG sources used only to size legacy density buckets.
  # The actual adaptive layers are vector XML drawables in android/app/src/main/res/drawable/:
  #   ic_launcher_foreground.xml  (black + red "A", ported from aelf-dailyreadings vectors)
  #   ic_launcher_monochrome.xml  (all-black silhouette, Android 13+ themed icons)
  # After running `dart run flutter_launcher_icons`, two manual steps are required:
  #   1. Restore mipmap-anydpi-v26/ic_launcher.xml (flutter_launcher_icons adds an unwanted
  #      <inset> wrapper — revert it to the plain <adaptive-icon> with direct drawable refs).
  #   2. Delete the generated drawable-*/ic_launcher_foreground.png and ic_launcher_monochrome.png
  #      so Android resolves the drawable/ vector XMLs instead of the density-bucketed PNGs.
  adaptive_icon_foreground: "assets/icons/ic_launcher_adaptive_foreground.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_monochrome: "assets/icons/ic_launcher_adaptive_monochrome.png"
  # To update icons run : dart run flutter_launcher_icons  (then follow steps above for Android)
  macos:
    generate: true
    image_path: "assets/icons/ic_launcher_1024_macos.png"
  windows:
    generate: true
    image_path: "assets/icons/ic_launcher_1024_macos.png"
    icon_size: 256

# For information on the generic Dart part of this file, see the
# following page: https://www.dartlang.org/tools/pub/pubspec

# The following section is specific to Flutter.
flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    # - images/a_dot_burr.jpeg
    # - images/a_dot_ham.jpeg
    - assets/
    - assets/bible.db
    - assets/icons/ic_launcher_android_round.png

  fonts:
    - family: LibertinusSerif
      fonts:
        - asset: assets/fonts/LibertinusSerif-Regular.otf
        - asset: assets/fonts/LibertinusSerif-Italic.otf
          style: italic
        - asset: assets/fonts/LibertinusSerif-Bold.otf
          weight: 700
        - asset: assets/fonts/LibertinusSerif-BoldItalic.otf
          weight: 700
          style: italic
    - family: SourceSans3
      fonts:
        - asset: assets/fonts/SourceSans3-Regular.ttf
        - asset: assets/fonts/SourceSans3-Italic.ttf
          style: italic
        - asset: assets/fonts/SourceSans3-Bold.ttf
          weight: 700
        - asset: assets/fonts/SourceSans3-BoldItalic.ttf
          weight: 700
          style: italic
